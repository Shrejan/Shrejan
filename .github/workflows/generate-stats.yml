name: Generate GitHub Stats SVGs

on:
  schedule:
    - cron: "0 0 * * *"    # regenerates once a day
  workflow_dispatch: {}      # lets you trigger it manually from the Actions tab
  push:
    branches:
      - main                # change to "master" if that's your default branch

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate stats images
        uses: jstrieb/github-stats@master
        with:
          username: Shrejan
          exclude_repos: ""
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push generated files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add generated/
          git diff --staged --quiet && echo "No changes to commit" || git commit -m "Update generated stats images"
          git push
